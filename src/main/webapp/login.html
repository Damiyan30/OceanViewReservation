<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>OceanView Reservation - Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#0dccf2",
            "background-light": "#f5f8f8",
            "background-dark": "#101f22",
          },
          fontFamily: {
            display: ["Plus Jakarta Sans", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    .glass-morphism {
      background: rgba(16, 31, 34, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(13, 204, 242, 0.1);
    }
    .ocean-gradient {
      background: linear-gradient(135deg, #0dccf2 0%, #0891b2 100%);
    }
  </style>
</head>
<body class="min-h-screen bg-background-light font-display dark:bg-background-dark">
  <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden bg-background-light dark:bg-background-dark">
    <div class="pointer-events-none fixed inset-0 z-0 overflow-hidden">
      <div class="absolute -left-[10%] -top-[10%] h-[40%] w-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
      <div class="absolute bottom-[10%] right-[10%] h-[30%] w-[30%] rounded-full bg-primary/5 blur-[100px]"></div>
    </div>

    <div class="layout-container z-10 flex h-full grow flex-col">
      <header class="flex items-center justify-between border-b border-slate-200 px-6 py-4 dark:border-primary/10 lg:px-40">
        <div class="flex items-center gap-3 text-slate-900 dark:text-white">
          <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary/15 text-sm font-extrabold text-primary">OV</div>
          <h2 class="text-xl font-bold leading-tight tracking-tight text-slate-900 dark:text-white">OceanView Reservation</h2>
        </div>
      </header>

      <main class="flex flex-1 items-center justify-center p-6">
        <div class="glass-morphism w-full max-w-md rounded-2xl border border-primary/20 p-8 shadow-2xl">
          <div class="mb-8 text-center">
            <h1 class="mb-2 text-3xl font-black leading-tight tracking-tight text-slate-900 dark:text-white">Welcome Back</h1>
            <p class="text-base font-normal text-slate-500 dark:text-primary/60">Log in to manage your reservations</p>
          </div>

          <form class="space-y-6" id="loginForm">
            <div class="flex flex-col gap-2">
              <label class="px-1 text-sm font-semibold text-slate-700 dark:text-slate-200" for="username">Username</label>
              <input class="flex h-14 w-full rounded-xl border border-slate-200 bg-white px-4 text-base font-normal text-slate-900 placeholder:text-slate-400 focus:outline-0 focus:ring-2 focus:ring-primary/50 dark:border-primary/20 dark:bg-background-dark/50 dark:text-white dark:placeholder:text-slate-500" id="username" name="username" placeholder="Enter your username" required type="text"/>
            </div>

            <div class="flex flex-col gap-2">
              <label class="px-1 text-sm font-semibold text-slate-700 dark:text-slate-200" for="password">Password</label>
              <input class="flex h-14 w-full rounded-xl border border-slate-200 bg-white px-4 text-base font-normal text-slate-900 placeholder:text-slate-400 focus:outline-0 focus:ring-2 focus:ring-primary/50 dark:border-primary/20 dark:bg-background-dark/50 dark:text-white dark:placeholder:text-slate-500" id="password" name="password" placeholder="Enter your password" required type="password"/>
            </div>

            <button class="ocean-gradient flex h-14 w-full items-center justify-center rounded-xl text-lg font-bold text-white shadow-lg shadow-primary/20 transition-all hover:opacity-90" id="btnLogin" type="submit">Sign In</button>
          </form>

          <pre class="hidden mt-6 overflow-x-auto whitespace-pre-wrap rounded-xl border border-red-500/30 bg-red-500/10 p-4 font-mono text-xs text-red-400" id="out"></pre>

          <div class="mt-8 flex justify-center border-t border-slate-200 pt-6 dark:border-primary/10">
            <a class="text-sm font-medium text-primary transition-colors hover:text-primary/80" href="help.html">Need help signing in?</a>
          </div>
        </div>
      </main>

      <div class="px-6 pb-10 lg:px-40">
        <div class="group relative h-48 w-full overflow-hidden rounded-2xl">
          <div class="absolute inset-0 z-10 bg-gradient-to-t from-background-dark to-transparent"></div>
          <img alt="Calm tropical beach sunset" class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-105" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDX7BxuVjLzegAlEE7uJP5ho4mWPGxHQ-NExISEsP5Kz-Qx7nGxkltx5JWyAiVHlPc-GX7KmUGOg7By8xy6--xRr5_T3HwPot9ff4m2mJ9dbTy2QV_YLKwuEPl1tHuM6aKuzza97PE0dLkHABiyyoNwhB0L7K4YkKKBVBWdpuWyiuIj9dnjDKHLLVrHSm4x6p0EBHgdb_r60vfoFajEQh-AKgHsb6GPI2qnZ4iCCVJlfgatJcGpBbCux0uTU5gYdWmCFSyOw_JM4w0"/>
          <div class="absolute bottom-6 left-6 z-20">
            <p class="text-lg font-bold text-white">Experience Serenity</p>
            <p class="text-sm text-slate-300">Luxury stays at the coast with OceanView.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
