<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Login • OceanViewReservation</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>OceanViewReservation</h1>
          <div class="sub">Secure staff login</div>
        </div>
      </div>
      <div class="nav">
        <a class="badge" href="help.html">Help</a>
      </div>
    </div>

    <div class="main card">
      <h2>Login</h2>
      <div class="grid two">
        <div class="field">
          <label>Username</label>
          <input class="input" id="username" placeholder="e.g., admin" autocomplete="username">
        </div>
        <div class="field">
          <label>Password</label>
          <input class="input" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="btnLogin">Sign in</button>
        <a class="btn btn-secondary" href="index.html" style="display:inline-block;">Home</a>
      </div>

      <div id="out" class="mono" style="display:none;"></div>
    </div>
  </div>

  <script>
    $("btnLogin").addEventListener("click", async ()=>{
      const username = $("username").value.trim();
      const password = $("password").value;

      if(!username || !password){
        toast("Missing info", "Enter username and password.", "warn");
        return;
      }

      try{
        const data = await api("api/login", {
          method:"POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({username, password})
        });
        toast("Welcome", `Logged in as ${username}`, "ok");
        location.href = "dashboard.html";
      }catch(e){
        $("out").style.display = "block";
        $("out").textContent = e.message;
        toast("Login failed", e.message, "err");
      }
    });
  </script>
</body>
</html>
