<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bill • OceanViewReservation</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>OceanViewReservation</h1>
          <div class="sub">Invoice</div>
        </div>
      </div>
      <div class="nav">
        <span class="badge" data-user-badge>Loading…</span>
        <a class="badge" href="dashboard.html">Dashboard</a>
        <a class="badge" href="help.html">Help</a>
      </div>
    </div>

    <div class="main card">
      <div class="no-print">
        <h2>Calculate / Print Bill</h2>
        <div class="grid two">
          <div class="field">
            <label>Reservation ID</label>
            <input class="input" id="rid" type="number" placeholder="e.g., 1">
          </div>
          <div class="field" style="display:flex; align-items:end; gap:10px;">
            <button class="btn btn-primary" id="btnLoad">Load Bill</button>
            <button class="btn btn-secondary" id="btnPrint" disabled>Print</button>
          </div>
        </div>
      </div>

      <div id="out" class="mono" style="display:none;"></div>

      <div id="invoice" class="card" style="display:none; margin-top:14px;">
        <h2>OceanViewReservation • Invoice</h2>
        <div id="invRows"></div>
        <hr class="hr">
        <div style="display:flex; justify-content:space-between; font-size:18px; font-weight:900;">
          <div>Total (Rs.)</div>
          <div id="total"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const outBox = $("out");
    const out = (t)=>{ outBox.style.display="block"; outBox.textContent=t; };

    function rrow(label, value){
      return `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed var(--border);">
        <div style="color:var(--muted)">${label}</div>
        <div style="font-weight:800">${value ?? ""}</div>
      </div>`;
    }

    async function loadBill(id){
      try{
        const b = await api("api/bill?id=" + encodeURIComponent(id));
        $("invoice").style.display = "block";
        $("btnPrint").disabled = false;
        outBox.style.display = "none";

        $("invRows").innerHTML =
          rrow("Reservation ID", b.reservationId) +
          rrow("Guest", b.guestName) +
          rrow("Contact", b.contactNo) +
          rrow("Room Type", `${b.roomType} (Rs. ${money(b.nightlyRate)}/night)`) +
          rrow("Check-in", b.checkIn) +
          rrow("Check-out", b.checkOut) +
          rrow("Nights", b.nights);

        $("total").textContent = money(b.total);
        toast("Loaded", `Invoice for reservation ${b.reservationId}`, "ok");
      }catch(e){
        $("invoice").style.display = "none";
        $("btnPrint").disabled = true;
        out(e.message);
        toast("Error", e.message, "err");
      }
    }

    (async ()=>{
      await requireAuth();

      const match = (location.hash||"").match(/id=(\d+)/);
      if(match){
        $("rid").value = match[1];
        await loadBill(match[1]);
      }

      $("btnLoad").addEventListener("click", async ()=>{
        const id = $("rid").value;
        if(!id) return toast("Missing", "Enter a Reservation ID.", "warn");
        await loadBill(id);
      });

      $("btnPrint").addEventListener("click", ()=> window.print());
    })();
  </script>
</body>
</html>
