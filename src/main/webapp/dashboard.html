<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dashboard • OceanViewReservation</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>OceanViewReservation</h1>
          <div class="sub">Dashboard</div>
        </div>
      </div>
      <div class="nav">
        <span class="badge" data-user-badge>Loading…</span>
        <a class="badge" href="help.html">Help</a>
        <button class="btn btn-secondary no-print" id="btnLogout">Logout</button>
      </div>
    </div>

    <div class="main">
      <div class="card">
        <h2>Quick actions</h2>
        <p>Create and manage reservations, and print invoices.</p>

        <div class="kpis">
          <div class="kpi">
            <div class="t">Create reservation</div>
            <div class="v">Add</div>
            <div class="actions">
              <button class="btn btn-primary" onclick="location.href='add-reservation.html'">Add Reservation</button>
            </div>
          </div>
          <div class="kpi">
            <div class="t">Find reservation</div>
            <div class="v">View</div>
            <div class="actions">
              <button class="btn btn-secondary" onclick="location.href='view-reservation.html'">View Reservation</button>
            </div>
          </div>
          <div class="kpi">
            <div class="t">Invoice</div>
            <div class="v">Bill</div>
            <div class="actions">
              <button class="btn btn-secondary" onclick="location.href='bill.html'">Calculate / Print</button>
            </div>
          </div>
        </div>

        <hr class="hr">

        <div class="actions">
          <button class="btn btn-secondary" onclick="location.href='help.html'">Help</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (async ()=>{
      await requireAuth();
      $("btnLogout").addEventListener("click", async ()=>{
        try{
          await api("api/logout", {method:"POST"});
          toast("Signed out", "You have been logged out.", "ok");
          location.href = "login.html";
        }catch(e){
          toast("Error", e.message, "err");
        }
      });
    })();
  </script>
</body>
</html>
