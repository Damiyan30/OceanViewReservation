<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Add Reservation • OceanViewReservation</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>OceanViewReservation</h1>
          <div class="sub">Add Reservation</div>
        </div>
      </div>
      <div class="nav">
        <span class="badge" data-user-badge>Loading…</span>
        <a class="badge" href="dashboard.html">Dashboard</a>
        <a class="badge" href="help.html">Help</a>
      </div>
    </div>

    <div class="main card">
      <h2>Guest details</h2>

      <div class="grid two">
        <div class="field">
          <label>Guest Name *</label>
          <input class="input" id="guestName" placeholder="e.g., John Silva">
        </div>
        <div class="field">
          <label>Contact No *</label>
          <input class="input" id="contactNo" placeholder="e.g., 0771234567">
        </div>
      </div>

      <div class="grid two">
        <div class="field">
          <label>Email (optional)</label>
          <input class="input" id="email" placeholder="e.g., john@gmail.com">
        </div>
        <div class="field">
          <label>Address (optional)</label>
          <input class="input" id="address" placeholder="e.g., Colombo">
        </div>
      </div>

      <hr class="hr">

      <h2>Reservation</h2>
      <div class="grid three">
        <div class="field">
          <label>Room Type *</label>
          <select class="select" id="typeId"></select>
        </div>
        <div class="field">
          <label>Check-in *</label>
          <input class="input" id="checkIn" type="date">
        </div>
        <div class="field">
          <label>Check-out *</label>
          <input class="input" id="checkOut" type="date">
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="btnSave">Save Reservation</button>
        <button class="btn btn-secondary" id="btnClear" type="button">Clear</button>
      </div>

      <div id="out" class="mono" style="display:none;"></div>
    </div>
  </div>

  <script>
    const outBox = $("out");
    const out = (t)=>{ outBox.style.display="block"; outBox.textContent=t; };

    async function loadTypes(){
      const types = await api("api/room-types");
      const sel = $("typeId");
      sel.innerHTML = "";
      types.forEach(t=>{
        const opt = document.createElement("option");
        opt.value = t.typeId;
        opt.textContent = `${t.typeName} (Rs. ${money(t.nightlyRate)}/night)`;
        sel.appendChild(opt);
      });
    }

    function clearForm(){
      ["guestName","contactNo","email","address","checkIn","checkOut"].forEach(id=>$(id).value="");
      outBox.style.display="none";
      outBox.textContent="";
    }

    (async ()=>{
      await requireAuth();
      await loadTypes();

      $("btnClear").addEventListener("click", clearForm);

      $("btnSave").addEventListener("click", async ()=>{
        const guestName = $("guestName").value.trim();
        const contactNo = $("contactNo").value.trim();
        const email = $("email").value.trim();
        const address = $("address").value.trim();
        const typeId = parseInt($("typeId").value, 10);
        const checkIn = $("checkIn").value;
        const checkOut = $("checkOut").value;

        // Client-side validation
        if(!guestName) return toast("Missing", "Guest Name is required.", "warn");
        if(!contactNo) return toast("Missing", "Contact No is required.", "warn");
        if(!checkIn) return toast("Missing", "Check-in is required.", "warn");
        if(!checkOut) return toast("Missing", "Check-out is required.", "warn");
        if(checkOut <= checkIn) return toast("Invalid dates", "Check-out must be after check-in.", "warn");

        const digitsOnly = contactNo.replace(/\D/g,'');
        if(digitsOnly.length < 9) return toast("Invalid", "Contact No seems too short.", "warn");
        if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return toast("Invalid", "Email format is invalid.", "warn");

        try{
          const res = await api("api/reservations", {
            method:"POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({guestName, contactNo, email, address, typeId, checkIn, checkOut})
          });
          out(JSON.stringify(res, null, 2));
          toast("Saved", `Reservation created. ID: ${res.reservationId}`, "ok");

          // quick next actions
          const id = res.reservationId;
          setTimeout(()=> {
            if(confirm(`Reservation created (ID: ${id}). View it now?`)){
              location.href = `view-reservation.html#id=${encodeURIComponent(id)}`;
            }
          }, 250);
        }catch(e){
          out(e.message);
          toast("Save failed", e.message, "err");
        }
      });
    })();
  </script>
</body>
</html>
