<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>View Reservation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="assets/styles.css" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#102222",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 py-4 md:px-10">
<div class="flex items-center gap-3 text-primary">
<div class="size-6">
<svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">OceanView</h2>
</div>
<a class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-xl h-10 px-4 bg-primary/10 text-primary text-sm font-bold border border-primary/20 hover:bg-primary/20 transition-colors" href="dashboard.html"><span class="truncate">Dashboard</span></a>
</header>

<main class="flex-1 flex items-center justify-center p-6 bg-gradient-to-b from-background-dark to-slate-950">
<div class="w-full max-w-3xl bg-slate-900/50 border border-slate-800 rounded-xl shadow-2xl p-8 backdrop-blur-sm">
<h1 class="text-2xl md:text-3xl font-black text-slate-100 mb-2">View Reservation</h1>
<p class="text-slate-400 text-sm mb-6">Search by Reservation ID.</p>

<div class="flex flex-col md:flex-row gap-3 items-stretch md:items-end">
<div class="flex-1">
<label class="text-slate-300 text-sm font-medium px-1">Reservation ID</label>
<input class="w-full h-12 rounded-xl bg-slate-800/50 border border-slate-700 text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="rid" placeholder="e.g., 1" type="number"/>
</div>
<button class="flex min-w-[140px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-6 bg-primary text-background-dark text-sm font-bold transition-all hover:bg-primary/90" id="btnSearch" type="button">
<span class="material-symbols-outlined mr-2">search</span> Search
</button>
<button class="flex min-w-[180px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-6 bg-slate-200 dark:bg-slate-800 text-slate-400 dark:text-slate-500 text-sm font-bold transition-all disabled:cursor-not-allowed hover:enabled:bg-primary/20 hover:enabled:text-primary" disabled id="btnBill" type="button">
<span class="material-symbols-outlined mr-2">receipt_long</span> View Billing
</button>
</div>

<div class="hidden mt-8" id="result">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="p-5 rounded-xl border border-slate-800 bg-slate-800/30">
<p class="text-slate-400 text-xs">Guest</p>
<p class="text-slate-100 font-bold text-lg" id="res-guest-name">---</p>
<p class="text-slate-400 text-sm" id="res-guest-email">---</p>
</div>

<div class="p-5 rounded-xl border border-slate-800 bg-slate-800/30">
<p class="text-slate-400 text-xs">Room</p>
<p class="text-slate-100 font-bold text-lg" id="res-room-type">---</p>
<p class="text-slate-400 text-sm" id="res-room-id">---</p>
</div>

<div class="p-5 rounded-xl border border-slate-800 bg-slate-800/30">
<p class="text-slate-400 text-xs">Check-in</p>
<p class="text-slate-100 font-bold" id="res-checkin">---</p>
</div>

<div class="p-5 rounded-xl border border-slate-800 bg-slate-800/30">
<p class="text-slate-400 text-xs">Check-out</p>
<p class="text-slate-100 font-bold" id="res-checkout">---</p>
</div>
</div>
</div>

<pre class="mt-6 p-4 rounded-lg bg-slate-950/40 border border-slate-800 text-slate-200 text-xs overflow-auto font-mono" id="out">// JSON output will appear here…</pre>
</div>
</main>

</div>
</div>
<script src="assets/app.js"></script>
</body></html>
