<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>View Reservation • OceanViewReservation</title>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/app.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>OceanViewReservation</h1>
          <div class="sub">View Reservation</div>
        </div>
      </div>
      <div class="nav">
        <span class="badge" data-user-badge>Loading…</span>
        <a class="badge" href="dashboard.html">Dashboard</a>
        <a class="badge" href="help.html">Help</a>
      </div>
    </div>

    <div class="main card">
      <h2>Search</h2>
      <div class="grid two">
        <div class="field">
          <label>Reservation ID</label>
          <input class="input" id="rid" type="number" placeholder="e.g., 1">
        </div>
        <div class="field" style="display:flex; align-items:end; gap:10px;">
          <button class="btn btn-primary" id="btnSearch">Search</button>
          <button class="btn btn-secondary" id="btnBill" disabled>Open Bill</button>
        </div>
      </div>

      <div id="result" class="card" style="margin-top:14px; display:none;">
        <h2>Reservation details</h2>
        <div id="rows"></div>
      </div>

      <div id="out" class="mono" style="display:none;"></div>
    </div>
  </div>

  <script>
    const outBox = $("out");
    const showOut = (t)=>{ outBox.style.display="block"; outBox.textContent=t; };

    function row(label, value){
      return `<div class="row" style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed var(--border);">
        <div style="color:var(--muted)">${label}</div>
        <div style="font-weight:700">${value ?? ""}</div>
      </div>`;
    }

    async function search(id){
      try{
        const r = await api("api/reservations?id=" + encodeURIComponent(id));
        $("result").style.display="block";
        $("rows").innerHTML =
          row("Reservation ID", r.reservationId) +
          row("Guest", r.guestName) +
          row("Contact", r.contactNo) +
          row("Email", r.email || "-") +
          row("Address", r.address || "-") +
          row("Room Type", `${r.typeName} (Rs. ${money(r.nightlyRate)}/night)`) +
          row("Check-in", r.checkIn) +
          row("Check-out", r.checkOut);

        $("btnBill").disabled = false;
        $("btnBill").onclick = ()=> location.href = `bill.html#id=${encodeURIComponent(r.reservationId)}`;
        outBox.style.display="none";
        toast("Found", `Reservation ${r.reservationId} loaded.`, "ok");
      }catch(e){
        $("result").style.display="none";
        $("btnBill").disabled = true;
        showOut(e.message);
        toast("Not found", e.message, "err");
      }
    }

    (async ()=>{
      await requireAuth();

      const hash = location.hash || "";
      const match = hash.match(/id=(\d+)/);
      if(match){
        $("rid").value = match[1];
        await search(match[1]);
      }

      $("btnSearch").addEventListener("click", async ()=>{
        const id = $("rid").value;
        if(!id) return toast("Missing", "Enter a Reservation ID.", "warn");
        await search(id);
      });
    })();
  </script>
</body>
</html>
